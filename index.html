<!DOCTYPE html>
<html>
<head>
  <title>Buli App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍻 Buli App</h1>

<input id="name" placeholder="Neved">

<select id="table">
  <option value="1">Asztal 1</option>
  <option value="2">Asztal 2</option>
  <option value="3">Asztal 3</option>
  <option value="4">Asztal 4</option>
  <option value="5">Asztal 5</option>
  <option value="6">Asztal 6</option>
</select>

<button onclick="join()">Belépés</button>

<script>
function join(){
  let name = document.getElementById("name").value;
  let table = document.getElementById("table").value;

  localStorage.setItem("name", name);
  localStorage.setItem("table", table);

  window.location.href = "game.html";
}
</script>

</body>
</html>
